    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-slide { animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <!-- O Motor de Banco de Dados Injetado -->

</head>
<body class="selection:bg-[#EF4444] selection:text-white">

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // --- CONFIGURAÇÃO DO BANCO DE DADOS ---
    const SUPABASE_URL = "https://abysylbeskbzqinyxxxq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_bN16VNLMRvH8BHimENwnLw_J15rCVGT";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const CHAVE_API_SPORTS = ""; 

    // ÍCONES
    const IconTrophy = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>;
    const IconActivity = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>;
    const IconMenu = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>;
    const IconSettings = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
    const IconChevronLeft = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>;
    const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>;
    const IconEdit = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>;
    const IconEye = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>;
    const IconShare = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>;
    const IconTrending = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>;
    const IconLink = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>;
    const IconClock = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
    const IconCalendar = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>;
    const IconPlus = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>;
    const IconTable = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>;

    // DADOS INICIAIS DE BACKUP (Design Preservado e Integrado)
    const MOCK_TABLES_INIT = {
      'Todas': [ { title: 'Assuntos do Momento', type: 'trends', data: [{ team: 'Ouro no Skate', stat: '🔥 Em alta' }, { team: 'Final da Champions', stat: '⚽ Fervendo' }] } ],
      'Futebol': [
        { title: 'Brasileirão Série A (Masc)', type: 'points', data: [{ team: 'Palmeiras', team_logo: 'https://images.unsplash.com/photo-1574044536246-12b4b4b2b2b2?w=100', stat: '33', pj: '14', vit: '10', e: '3', der: '1', gm: '24' }, { team: 'Flamengo', team_logo: 'https://images.unsplash.com/photo-1574044536246-12b4b4b2b2b2?w=100', stat: '27', pj: '13', vit: '8', e: '3', der: '2', gm: '26' }] },
        { title: 'Estatísticas - Gols', type: 'player_stats', sub_type: 'gols', data: [{ player: 'Kevin Viveros', player_photo: 'https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?w=100', team: 'Athletico-PR', team_logo: 'https://images.unsplash.com/photo-1574044536246-12b4b4b2b2b2?w=100', stat: '8' }, { player: 'Pedro', player_photo: 'https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?w=100', team: 'Flamengo', team_logo: 'https://images.unsplash.com/photo-1574044536246-12b4b4b2b2b2?w=100', stat: '8' }] }
      ],
      'Tênis de Mesa': [ { title: 'Ranking Mundial da ITTF', type: 'rank', sub_types: ['Sênior', 'Juventude', 'Corrida Final WTT'], current_sub: 'Sênior', categories: ['Simples Masculino', 'Solteiras', 'Duplas'], current_cat: 'Simples Masculino', data: [{ player: 'Fan Zhendong', player_photo: 'https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?w=100', country: 'CHN', stat: '1º' }, { player: 'Hugo Calderano (BRA)', player_photo: 'https://images.unsplash.com/photo-1531427186611-ecfd6d936c79?w=100', country: 'BRA', stat: '5º' }] } ]
    };

    const BRASILEIRAO_ABOUT = "O Campeonato Brasileiro de Futebol, também conhecido como Campeonato Brasileiro Série A ou Brasileirão, é a liga brasileira de futebol profissional entre clubes do Brasil, sendo a principal competição futebolística no país.";

    // --- CÓDIGO HTML COMPLETO E INTEGRADO (600+ LINHAS) ---

    const MOCK_UPCOMING_INIT = {
      'Todas': [{ match: 'Flamengo x Palmeiras', date: 'Hoje, 21:30', cup: 'Brasileirão' }],
      'Futebol': [{ match: 'Flamengo x Palmeiras', date: 'Hoje, 21:30', cup: 'Brasileirão' }, { match: 'Real Madrid x City', date: 'Amanhã, 16:00', cup: 'Champions' }],
      'Tênis de Mesa': [{ match: 'Hugo Calderano x Ma Long', date: 'Qua, 09:00', cup: 'WTT Champions' }]
    };

    const MOCK_TICKER_INIT = [
      "🔴 Corinthians dispara no Brasileirão Feminino",
      "🛹 CBSk anuncia circuito nacional de skate",
      "🏐 Zé Roberto anuncia convocação final"
    ];

    const INITIAL_ARTICLES = [
      { id: '1', title: 'Skate Street: Rayssa Leal domina a pista e leva o ouro inédito', category: 'Skate', excerpt: 'A brasileira superou as japonesas e garantiu o lugar mais alto do pódio.', content: 'Foi uma final de tirar o fôlego...', image: 'https://images.unsplash.com/photo-1564982752979-3f7bc974d29a?auto=format&fit=crop&q=80&w=1000', views: '12.4k', date: '2026-05-03T10:15', linkedArticleId: '' },
      { id: '2', title: 'Champions League: Real Madrid e City fazem duelo histórico', category: 'Futebol', excerpt: 'Em jogo de 6 gols, as equipes mostram por que são as favoritas ao título.', content: 'O jogo foi marcado por viradas...', image: 'https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=600', views: '28.1k', date: '2026-05-02T23:40', linkedArticleId: '' }
    ];

    const CATEGORIAS = ['Todas', 'Futebol', 'Tênis de Mesa', 'Tabela Interativa', 'Vôlei', 'Skate', 'UFC'];

    const formatDateTime = (isoString) => {
      if (!isoString) return 'Data não definida';
      try {
        const dateObj = new Date(isoString);
        return dateObj.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
      } catch (e) { return isoString; }
    };

    function ArenaNews() {
      // ESTADOS DE NAVEGAÇÃO
      const [view, setView] = useState('home');
      const [selectedArticle, setSelectedArticle] = useState(null);
      const [activeCategory, setActiveCategory] = useState('Todas');
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('noticias');
      const [loading, setLoading] = useState(true);

      // ESTADOS DE DADOS (Preservados e Integrados)
      const [articles, setArticles] = useState(INITIAL_ARTICLES);
      const [dashboardTables, setDashboardTables] = useState(MOCK_TABLES_INIT);
      const [upcomingMatches, setUpcomingMatches] = useState(MOCK_UPCOMING_INIT);
      const [tickerItems, setTickerItems] = useState(MOCK_TICKER_INIT);

      // --- CARREGAMENTO GLOBAL DO SUPABASE ---
      const loadAllData = useCallback(async () => {
        try {
          const { data: news } = await supabase.from('noticias').select('*').order('date', { ascending: false });
          if (news && news.length > 0) setArticles(news);

          const { data: tabs } = await supabase.from('tabelas_dashboard').select('*');
          if (tabs && tabs.length > 0) {
            const grouped = {};
            tabs.forEach(t => { if (!grouped[t.category]) grouped[t.category] = []; grouped[t.category].push(t); });
            setDashboardTables(grouped);
          }

          const { data: trans } = await supabase.from('transmissoes').select('*');
          if (trans && trans.length > 0) {
            const groupedT = {};
            trans.forEach(t => { if (!groupedT[t.category]) groupedT[t.category] = []; groupedT[t.category].push(t); });
            setUpcomingMatches(groupedT);
          }

          const { data: ticks } = await supabase.from('tickers').select('message');
          if (ticks && ticks.length > 0) setTickerItems(ticks.map(t => t.message));
        } catch (err) { console.error("Erro Supabase:", err); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { loadAllData(); }, [loadAllData]);

      const getNowLocalISO = () => new Date().toLocaleString('sv').replace(' ', 'T').slice(0, 16);
      const [newPost, setNewPost] = useState({ title: '', category: 'Futebol', excerpt: '', image: '', content: '', linkedArticleId: '', date: getNowLocalISO() });
      const [editingId, setEditingId] = useState(null);
      const [adminCategoryFilter, setAdminCategoryFilter] = useState('Futebol'); 

      const handleSecretAccess = () => {
        if (isAdmin) { setIsAdmin(false); setView('home'); return; }
        const pin = prompt("🔐 Acesso Restrito da Redação. Insira o PIN:");
        if (pin === "2026") { setIsAdmin(true); alert("Sessão da Editora liberada."); }
      };

      const openArticle = (article) => { setSelectedArticle(article); window.scrollTo({ top: 0, behavior: 'smooth' }); setView('article'); };

      const filteredArticles = activeCategory === 'Todas' ? articles : articles.filter(a => a.category === activeCategory);

      // --- NOVA FUNCIONALIDADE: VISUALIZAÇÃO INTERATIVA DA TABELA ---
      const renderInteractiveTableView = () => {
        const brasileiraoTable = dashboardTables['Futebol']?.find(t => t.type === 'points') || MOCK_TABLES_INIT['Futebol'][0];
        const playerGols = dashboardTables['Futebol']?.find(t => t.sub_type === 'gols') || MOCK_TABLES_INIT['Futebol'][1];

        return (
          <main className="max-w-[1400px] mx-auto px-4 py-10 animate-fade-slide grid grid-cols-1 md:grid-cols-3 gap-8">
            <div className="md:col-span-2">
              <div className="bg-[#0B172A] p-6 rounded-3xl shadow-xl border-b-[3px] border-[#10B981] flex justify-between items-center mb-8">
                <div className="flex items-center gap-3">
                  <span className="animate-spin-logo bg-[#EF4444] text-white p-2 rounded shadow-lg text-lg font-black">A</span>
                  <div>
                    <h1 className="text-3xl font-black text-white tracking-tight">Brasileirão Série A</h1>
                    <p className="text-gray-400 text-sm">Visão Geral, Partidas, Classificação, Estatísticas</p>
                  </div>
                </div>
              </div>

              {renderDashboardTable(brasileiraoTable, false)}
            </div>

            <aside className="flex flex-col gap-8">
              {renderDashboardTable(playerGols, true)}

              <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                <h3 className="font-black text-3xl text-[#0B172A] tracking-tighter mb-4">Sobre</h3>
                <p className="text-gray-600 leading-relaxed font-serif">{BRASILEIRAO_ABOUT}</p>
                <a href="https://pt.wikipedia.org/wiki/Campeonato_Brasileiro_de_Futebol_-_S%C3%A9rie_A" target="_blank" className="text-[#10B981] font-bold text-sm mt-3 inline-block hover:underline">Wikipedia</a>
              </div>
            </aside>
          </main>
        );
      };

      // Componente reutilizável para renderizar tabelas com o novo design
      const renderDashboardTable = (tableInfo, isPlayerStats) => {
        if (!tableInfo) return null;

        return (
          <div className="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-lg animate-fade-slide">
            <div className="bg-[#0B172A] p-4 flex items-center justify-between border-b-[3px] border-[#10B981]">
              <h3 className="font-black text-white uppercase tracking-wider text-xs flex items-center gap-2">
                <IconTrophy /> {tableInfo.title}
              </h3>
              {tableInfo.type === 'points' && <span className="text-[10px] text-gray-400 font-bold flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#10B981] animate-pulse"></span> Ao vivo</span>}
            </div>
            <div className="p-0">
              <table className="w-full text-sm text-left">
                <thead className="bg-gray-50 text-[10px] uppercase text-gray-400 font-bold border-b border-gray-100">
                  <tr>
                    <th className="px-4 py-2 text-center tracking-widest w-12">#</th>
                    <th className="px-4 py-2 tracking-widest">{isPlayerStats ? 'Jogador' : 'Time'}</th>
                    {tableInfo.type === 'points' ? (
                      <>
                        <th className="px-4 py-2 text-right tracking-widest">Pts</th>
                        <th className="px-4 py-2 text-right tracking-widest">PJ</th>
                        <th className="px-4 py-2 text-right tracking-widest">VIT</th>
                        <th className="px-4 py-2 text-right tracking-widest">E</th>
                        <th className="px-4 py-2 text-right tracking-widest">DER</th>
                        <th className="px-4 py-2 text-right tracking-widest">GM</th>
                      </>
                    ) : (
                      <th className="px-4 py-2 text-right tracking-widest">{isPlayerStats ? (tableInfo.sub_type==='assistencias'?'Assis':'Gols') : 'Pos'}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {tableInfo.data.map((row, idx) => (
                    <tr key={idx} className="border-b border-gray-50 hover:bg-gray-50 transition-colors group">
                      <td className={`px-4 py-3 text-center text-xs font-bold ${idx === 0 ? 'text-[#10B981] border-l-4 border-[#10B981]' : (idx>tableInfo.data.length-3?'text-[#EF4444] border-l-4 border-[#EF4444]':'text-gray-500 border-l-4 border-transparent')}`}>
                        {idx + 1}
                      </td>
                      <td className="px-4 py-3 font-bold text-[#0B172A] flex items-center gap-3">
                        {isPlayerStats ? (
                          <>
                            <img src={row.player_photo} className="w-9 h-9 rounded-full object-cover border-2 border-gray-100" />
                            <div>
                              <p className="font-bold text-[#0B172A] text-sm">{row.player}</p>
                              <div className="flex items-center gap-1.5 text-xs text-gray-500 font-medium">
                                <img src={row.team_logo} className="w-4 h-4 rounded-full object-cover" /> {row.team}
                              </div>
                            </div>
                          </>
                        ) : (
                          <>
                            <img src={row.team_logo} className="w-8 h-8 rounded-full object-cover border-2 border-gray-100" />
                            <p className="font-bold text-[#0B172A] text-sm">{row.team}</p>
                          </>
                        )}
                      </td>
                      {tableInfo.type === 'points' ? (
                        <>
                          <td className={`px-4 py-3 text-right text-sm font-black ${idx === 0 ? 'text-[#10B981]' : 'text-[#0B172A]'}`}>{row.stat}</td>
                          <td className="px-4 py-3 text-right text-xs text-gray-500 font-medium">{row.pj}</td>
                          <td className="px-4 py-3 text-right text-xs text-gray-500 font-medium">{row.vit}</td>
                          <td className="px-4 py-3 text-right text-xs text-gray-500 font-medium">{row.e}</td>
                          <td className="px-4 py-3 text-right text-xs text-gray-500 font-medium">{row.der}</td>
                          <td className="px-4 py-3 text-right text-xs text-gray-500 font-medium">{row.gm}</td>
                        </>
                      ) : (
                        <td className={`px-4 py-3 text-right text-sm font-black ${idx === 0 ? 'text-[#10B981]' : 'text-[#0B172A]'}`}>{row.stat}</td>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // --- COMPONENTES VISUAIS PRINCIPAIS (Design Preservado) ---

      const renderHeader = () => (
        <header className="bg-[#0B172A] text-white sticky top-0 z-50 shadow-2xl border-b-[3px] border-[#10B981]">
          <div className="max-w-[1400px] mx-auto px-4 h-20 flex items-center justify-between">
            <div className="flex items-center gap-6">
              <button className="lg:hidden p-2 hover:bg-white/10 rounded-full transition-colors"><IconMenu /></button>
              <div className="cursor-pointer select-none group" onClick={() => {setView('home'); setActiveCategory('Todas');}}>
                <h1 className="text-3xl font-black tracking-tighter uppercase flex items-center gap-1">
                  <span onDoubleClick={handleSecretAccess} className="animate-spin-logo bg-[#EF4444] text-white px-2 py-0.5 rounded shadow-[0_0_15px_rgba(239,68,68,0.5)] text-2xl group-hover:scale-110 transition-transform cursor-pointer">A</span>
                  RENA<span className="font-light text-gray-300">NEWS</span>
                </h1>
              </div>
            </div>

            <nav className="hidden lg:flex items-center gap-1 overflow-x-auto no-scrollbar">
              {CATEGORIAS.map(cat => (
                <button key={cat} onClick={() => {setActiveCategory(cat); setView('home');}} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all duration-300 ${activeCategory === cat ? 'bg-[#10B981] text-[#0B172A] shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'text-gray-300 hover:text-white hover:bg-white/5'}`}>
                  {cat === 'Tabela Interativa' ? <span className="flex items-center gap-1.5"><IconTable/> Tabela</span> : cat}
                </button>
              ))}
            </nav>

            <div className="flex items-center gap-4">
              {isAdmin && (
                <button onClick={() => { setView(view === 'admin' ? 'home' : 'admin'); setEditingId(null); setAdminTab('noticias'); }} className="flex items-center gap-2 bg-[#10B981] text-[#0B172A] px-5 py-2.5 rounded-full text-xs font-black uppercase hover:bg-emerald-400 transition-all transform hover:scale-105 shadow-lg whitespace-nowrap">
                  <IconSettings /> Painel Geral
                </button>
              )}
            </div>
          </div>
        </header>
      );

      const renderTicker = () => (
        <div className="bg-[#EF4444] text-white overflow-hidden py-2 shadow-md relative z-40 border-b border-red-800">
          <div className="max-w-[1400px] mx-auto flex items-center">
            <div className="bg-[#0B172A] text-white px-4 py-1.5 rounded-r-full text-[11px] font-black uppercase tracking-widest z-10 absolute flex items-center gap-2 shadow-lg border-r-2 border-[#10B981]">
              <span className="w-2 h-2 rounded-full bg-[#EF4444] animate-pulse"></span> Radar Ao Vivo
            </div>
            <div className="w-full overflow-hidden ml-36">
              <div className="animate-marquee-custom font-bold text-sm tracking-wide text-red-50">
                {tickerItems.map((item, i) => <span key={i} className="mx-8">{item}</span>)}
              </div>
            </div>
          </div>
        </div>
      );

      const renderHomeView = () => {
        const featured = filteredArticles[0];
        const restNews = filteredArticles.slice(1);
        const currentUpcoming = upcomingMatches[activeCategory] || upcomingMatches['Todas'] || [];
        const tables = dashboardTables[activeCategory] || dashboardTables['Todas'] || [];

        return (
          <main className="max-w-[1400px] mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div className="lg:col-span-8">
              {featured && (
                <div onClick={() => openArticle(featured)} className="group cursor-pointer relative overflow-hidden rounded-3xl shadow-2xl aspect-[16/10] md:aspect-[21/9] bg-[#0B172A] mb-10 border border-gray-200/20">
                  <img src={featured.image} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-[1.03] transition-all duration-700 ease-in-out" />
                  <div className="absolute inset-0 bg-gradient-to-t from-[#0B172A] via-[#0B172A]/70 to-transparent"></div>
                  <div className="absolute bottom-0 left-0 w-full p-8 md:p-10">
                    <div className="flex items-center gap-3 mb-4">
                      <span className="bg-[#10B981] text-[#0B172A] text-xs font-black uppercase tracking-widest px-3 py-1 rounded-md shadow-lg">{featured.category}</span>
                      <span className="glass text-white text-xs font-semibold px-3 py-1 rounded-md flex items-center gap-1"><IconClock /> {formatDateTime(featured.date)}</span>
                    </div>
                    <h2 className="text-3xl md:text-5xl font-black text-white leading-tight mb-4 drop-shadow-lg group-hover:text-[#10B981] transition-colors">{featured.title}</h2>
                    <p className="text-gray-300 text-base md:text-lg font-medium line-clamp-2 max-w-3xl drop-shadow-md">{featured.excerpt}</p>
                  </div>
                </div>
              )}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                {restNews.map((a) => (
                  <div key={a.id} onClick={() => openArticle(a)} className="group cursor-pointer bg-white rounded-2xl shadow-sm hover:shadow-xl border border-gray-100 flex flex-col overflow-hidden transition-all duration-300 transform hover:-translate-y-1">
                    <div className="aspect-video overflow-hidden relative">
                      <img src={a.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                      <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-[#0B172A] text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded shadow-sm">{a.category}</div>
                    </div>
                    <div className="p-5 flex flex-col flex-1">
                      <h3 className="text-xl font-bold text-[#0B172A] leading-snug group-hover:text-[#10B981] transition-colors mb-2 line-clamp-2">{a.title}</h3>
                      <p className="text-sm text-gray-500 line-clamp-2 mb-4">{a.excerpt}</p>
                      <div className="mt-auto flex items-center justify-between text-xs text-gray-400 font-semibold pt-4 border-t border-gray-50">
                        <span className="flex items-center gap-1 truncate"><IconClock /> {formatDateTime(a.date)}</span>
                        <span className="flex items-center gap-1"><IconEye /> {a.views || '0'}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <aside className="lg:col-span-4 flex flex-col gap-6">
              {currentUpcoming.length > 0 && (
                <div className="bg-[#0B172A] border border-[#0B172A] rounded-3xl overflow-hidden shadow-lg animate-fade-slide">
                  <div className="bg-[#EF4444] p-4 flex items-center justify-between">
                    <h3 className="font-black text-white uppercase tracking-wider text-xs flex items-center gap-2"><IconCalendar /> Próximas Transmissões</h3>
                  </div>
                  <div className="p-4 flex flex-col gap-3">
                    {currentUpcoming.map((jogo, i) => (
                      <div key={i} className="bg-white/10 p-3 rounded-xl border border-white/5 hover:bg-white/20 transition-colors">
                        <span className="text-[#10B981] text-[10px] font-black uppercase tracking-widest block mb-1">{jogo.cup}</span>
                        <p className="font-bold text-white text-sm">{jogo.match}</p>
                        <p className="text-gray-400 text-xs mt-1 flex items-center gap-1"><IconClock /> {jogo.date}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              
              {/* Renderização de tabelas com design inspirado nas fotos */}
              {tables.map((tableInfo, tIndex) => {
                const isPlayerStats = tableInfo.type === 'player_stats';
                const isRank = tableInfo.type === 'rank';
                
                return (
                  <div key={`${activeCategory}-${tIndex}`} className="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-lg animate-fade-slide" style={{ animationDelay: `${tIndex * 0.1}s` }}>
                    <div className="bg-[#0B172A] p-4 flex items-center justify-between border-b-[3px] border-[#10B981]">
                      <h3 className="font-black text-white uppercase tracking-wider text-xs flex items-center gap-2">
                        {isPlayerStats ? <IconActivity/> : (tableInfo.type === 'trends' ? <IconTrending /> : <IconTrophy />)} {tableInfo.title}
                      </h3>
                    </div>
                    <div className="p-0">
                      <table className="w-full text-sm text-left">
                        <thead className="bg-gray-50 text-[10px] uppercase text-gray-400 font-bold border-b border-gray-100">
                          <tr>
                            <th className="px-4 py-2 text-center w-12">Pos</th>
                            <th className="px-4 py-2 tracking-widest">{isPlayerStats || isRank ? 'Jogador' : 'Competidor'}</th>
                            <th className="px-4 py-2 text-right tracking-widest">{tableInfo.type === 'points' ? 'Pts' : (isPlayerStats ? 'Qt' : (isRank ? 'Pos' : 'Status'))}</th>
                          </tr>
                        </thead>
                        <tbody>
                          {tableInfo.data.map((row, idx) => (
                            <tr key={idx} className="border-b border-gray-50 hover:bg-gray-50 transition-colors group">
                              <td className={`px-4 py-3 text-center text-xs font-black ${idx === 0 ? 'text-[#10B981]' : (idx === 1 ? 'text-gray-600' : 'text-gray-400')}`}>
                                {idx + 1}
                              </td>
                              <td className="px-4 py-3 font-bold text-[#0B172A] flex items-center gap-3">
                                {isPlayerStats || isRank ? (
                                  <>
                                    <img src={row.player_photo} className="w-9 h-9 rounded-full object-cover border-2 border-gray-100" />
                                    <div>
                                      <p className="font-bold text-[#0B172A] text-sm">{isRank ? row.player : row.player}</p>
                                      {isPlayerStats && (
                                        <div className="flex items-center gap-1.5 text-xs text-gray-500 font-medium">
                                          <img src={row.team_logo} className="w-4 h-4 rounded-full object-cover" /> {row.team}
                                        </div>
                                      )}
                                      {isRank && (
                                        <div className="flex items-center gap-1 text-[11px] text-gray-500 font-medium font-serif uppercase tracking-wider">
                                          <span>🌍 {row.country}</span>
                                        </div>
                                      )}
                                    </div>
                                  </>
                                ) : row.team}
                              </td>
                              <td className={`px-4 py-3 text-right text-sm font-black ${idx === 0 && tableInfo.type !== 'trends' ? 'text-[#10B981]' : 'text-[#0B172A]'}`}>{row.stat}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })}
            </aside>
          </main>
        );
      };

      const renderArticleView = () => {
        if (!selectedArticle) return null;
        const linkedNews = selectedArticle.linkedArticleId ? articles.find(a => a.id === selectedArticle.linkedArticleId) : null;
        return (
          <article className="max-w-[800px] mx-auto px-4 py-12 animate-fade-slide">
            <button onClick={() => setView('home')} className="flex items-center gap-2 text-gray-500 hover:text-[#0B172A] mb-8 font-bold text-xs uppercase tracking-widest bg-white border border-gray-200 px-4 py-2 rounded-full w-fit hover:shadow-md transition-all"><IconChevronLeft /> Voltar ao Portal</button>
            <div className="flex items-center gap-3 mb-6">
              <span className="bg-[#10B981] text-[#0B172A] font-black uppercase tracking-widest text-xs px-3 py-1 rounded-md">{selectedArticle.category}</span>
              <span className="text-gray-400 text-sm font-medium flex items-center gap-1 border-r border-gray-300 pr-3"><IconClock /> {formatDateTime(selectedArticle.date)}</span>
            </div>
            <h1 className="text-4xl md:text-5xl font-black text-[#0B172A] leading-[1.1] mb-6 tracking-tight">{selectedArticle.title}</h1>
            <p className="text-xl text-gray-500 font-medium mb-8 border-l-[3px] border-[#10B981] pl-5 leading-relaxed">{selectedArticle.excerpt}</p>
            <div className="relative mb-12"><img src={selectedArticle.image} className="w-full aspect-[21/9] object-cover rounded-3xl shadow-xl" /></div>
            {linkedNews && (
              <div onClick={() => openArticle(linkedNews)} className="bg-emerald-50 border border-[#10B981]/30 rounded-2xl p-6 mb-10 cursor-pointer hover:bg-emerald-100 transition-colors group shadow-sm">
                <div className="flex items-center gap-2 text-[#10B981] font-black uppercase text-xs tracking-widest mb-3"><IconLink /> Notícias anteriores:</div>
                <h4 className="text-[#0B172A] font-bold text-xl group-hover:text-[#10B981] transition-colors mb-2">{linkedNews.title}</h4>
              </div>
            )}
            <div className="text-lg max-w-none text-gray-800 leading-loose font-serif whitespace-pre-wrap"><p>{selectedArticle.content}</p></div>
          </article>
        );
      };

      const renderAdminPanel = () => {
        // --- FUNÇÕES DO ADMIN COM SUPABASE ---
        const handleSaveArticle = async (e) => {
          e.preventDefault();
          if (!newPost.title || !newPost.excerpt || !newPost.content) return alert("Preencha o título, lide e texto!");
          
          if (editingId) {
            await supabase.from('noticias').update(newPost).eq('id', editingId);
            setArticles(articles.map(a => a.id === editingId ? { ...newPost, id: editingId, views: a.views } : a));
            alert("Matéria atualizada!");
          } else {
            const { data } = await supabase.from('noticias').insert([{ id: Date.now().toString(), ...newPost, views: '0' }]).select();
            if(data) setArticles([data[0], ...articles]);
            alert("Manchete lançada!");
          }
          setNewPost({ title: '', category: 'Futebol', excerpt: '', image: '', content: '', linkedArticleId: '', date: getNowLocalISO() }); setEditingId(null); setView('home'); 
        };

        return (
          <div className="max-w-[1400px] mx-auto px-4 py-8 animate-fade-slide">
            <div className="flex flex-wrap gap-4 mb-8 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
              {['noticias', 'tabelas', 'transmissoes', 'ticker'].map(t => (
                <button key={t} onClick={() => setAdminTab(t)} className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-bold uppercase tracking-widest text-xs transition-colors ${adminTab === t ? 'bg-[#0B172A] text-[#10B981] shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>{t}</button>
              ))}
            </div>

            {adminTab === 'noticias' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-8 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                  <form onSubmit={handleSaveArticle} className="flex flex-col gap-6">
                    <input className="w-full bg-gray-50 border rounded-xl p-4 font-bold outline-none" placeholder="Título" value={newPost.title} onChange={e => setNewPost({...newPost, title: e.target.value})} />
                    <select className="bg-gray-50 border rounded-xl p-4 outline-none" value={newPost.category} onChange={e => setNewPost({...newPost, category: e.target.value})}>{CATEGORIAS.filter(c => c !== 'Todas' && c !== 'Tabela Interativa').map(c => <option key={c}>{c}</option>)}</select>
                    <input className="w-full bg-gray-50 border rounded-xl p-4" placeholder="URL da Foto" value={newPost.image} onChange={e => setNewPost({...newPost, image: e.target.value})} />
                    <textarea rows="6" className="w-full bg-gray-50 border rounded-xl p-4 outline-none" placeholder="Texto..." value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} />
                    <button type="submit" className="bg-[#10B981] text-[#0B172A] font-black py-4 rounded-xl uppercase tracking-widest text-sm shadow-lg">PUBLICAR AGORA</button>
                  </form>
                </div>
                <div className="lg:col-span-4 bg-white p-6 rounded-3xl border max-h-[600px] overflow-y-auto">
                   {articles.map(a => (
                     <div key={a.id} className="p-4 bg-gray-50 rounded-xl mb-3 flex flex-col border">
                       <p className="font-bold text-sm truncate mb-2">{a.title}</p>
                       <div className="flex gap-2 justify-end">
                         <button onClick={() => {setNewPost(a); setEditingId(a.id);}} className="text-blue-500 font-bold text-xs uppercase">Editar</button>
                         <button onClick={async () => {if(confirm('Apagar?')) { setArticles(articles.filter(x => x.id !== a.id)); await supabase.from('noticias').delete().eq('id', a.id); }}} className="text-red-500 font-bold text-xs uppercase">Remover</button>
                       </div>
                     </div>
                   ))}
                </div>
              </div>
            )}
            {(adminTab === 'tabelas' || adminTab === 'transmissoes' || adminTab === 'ticker') && <div className="text-center p-20 font-black text-gray-400">FUNCIONALIDADE EM INTEGRAÇÃO NO SUPABASE...</div>}
          </div>
        );
      }

      return (
        <div>
          {renderHeader()}
          {renderTicker()}
          {view === 'home' && (activeCategory === 'Tabela Interativa' ? renderInteractiveTableView() : renderHomeView())}
          {view === 'article' && renderArticleView()}
          {view === 'admin' && renderAdminPanel()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ArenaNews />);
  </script>
</body>
</html>
