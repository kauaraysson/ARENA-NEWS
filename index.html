<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena News - Portal Esportivo Premium</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23EF4444'/><text x='50' y='75' font-family='Arial' font-size='75' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    .animate-marquee-custom { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; }
    @keyframes spinLogo { 0%, 80% { transform: rotate(-3deg); } 100% { transform: rotate(357deg); } }
    .animate-spin-logo { display: inline-block; animation: spinLogo 5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #10B981; border-radius: 4px; }
    .glass { background: rgba(11, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-slide { animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="selection:bg-[#EF4444] selection:text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- CONFIGURAÇÃO DO BANCO DE DADOS ---
    const SUPABASE_URL = "https://abysylbeskbzqinyxxxq.supabase.co";
    const SUPABASE_KEY = "sb_publishable_bN16VNLMRvH8BHimENwnLw_J15rCVGT";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ÍCONES
    const IconTrophy = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>;
    const IconActivity = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>;
    const IconMenu = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>;
    const IconSettings = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
    const IconChevronLeft = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>;
    const IconTrash = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>;
    const IconEdit = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>;
    const IconEye = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>;
    const IconShare = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>;
    const IconTrending = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>;
    const IconLink = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>;
    const IconClock = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
    const IconCalendar = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>;
    const IconPlus = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>;

    function ArenaNews() {
      const [view, setView] = useState('home');
      const [selectedArticle, setSelectedArticle] = useState(null);
      const [activeCategory, setActiveCategory] = useState('Todas');
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('noticias');
      const [loading, setLoading] = useState(true);

      // --- ESTADOS DOS DADOS SINCRONIZADOS ---
      const [categorias, setCategorias] = useState(['Todas', 'Futebol', 'Vôlei', 'Tênis de Mesa', 'Skate', 'UFC']);
      const [articles, setArticles] = useState([]);
      const [dashboardTables, setDashboardTables] = useState({});
      const [upcomingMatches, setUpcomingMatches] = useState({});
      const [tickerItems, setTickerItems] = useState(["🔴 Carregando destaques..."]);

      // --- CARREGAMENTO INICIAL DO SUPABASE ---
      useEffect(() => {
        const loadAllData = async () => {
          setLoading(true);
          try {
            const { data: cats } = await supabase.from('categorias').select('nome');
            if (cats && cats.length > 0) setCategorias(['Todas', ...cats.map(c => c.nome)]);

            const { data: news } = await supabase.from('noticias').select('*').order('date', { ascending: false });
            if (news) setArticles(news);

            const { data: tabs } = await supabase.from('tabelas_dashboard').select('*');
            if (tabs) {
              const grouped = {};
              tabs.forEach(t => { if (!grouped[t.category]) grouped[t.category] = []; grouped[t.category].push(t); });
              setDashboardTables(grouped);
            }

            const { data: trans } = await supabase.from('transmissoes').select('*');
            if (trans) {
              const groupedT = {};
              trans.forEach(t => { if (!groupedT[t.category]) groupedT[t.category] = []; groupedT[t.category].push(t); });
              setUpcomingMatches(groupedT);
            }

            const { data: ticks } = await supabase.from('tickers').select('message');
            if (ticks && ticks.length > 0) setTickerItems(ticks.map(t => t.message));

          } catch (err) { console.error("Erro banco:", err); }
          finally { setLoading(false); }
        };
        loadAllData();
      }, []);

      const getNowLocalISO = () => new Date().toLocaleString('sv').replace(' ', 'T').slice(0, 16);
      const [newPost, setNewPost] = useState({ title: '', category: 'Futebol', excerpt: '', image: '', content: '', linkedArticleId: '', date: getNowLocalISO() });
      const [editingId, setEditingId] = useState(null);
      const [adminCategoryFilter, setAdminCategoryFilter] = useState('Futebol');

      const handleSecretAccess = () => {
        if (isAdmin) { setIsAdmin(false); setView('home'); return; }
        const pin = prompt("PIN:"); if (pin === "2026") setIsAdmin(true);
      };

      const openArticle = (article) => { setSelectedArticle(article); setView('article'); window.scrollTo(0,0); };
      const formatDateTime = (iso) => iso ? new Date(iso).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : 'Recente';

      // --- FUNÇÕES DE RENDERIZAÇÃO APROVADAS ---

      const renderHeader = () => (
        <header className="bg-[#0B172A] text-white sticky top-0 z-50 shadow-2xl border-b-[3px] border-[#10B981]">
          <div className="max-w-[1400px] mx-auto px-4 h-20 flex items-center justify-between">
            <div className="flex items-center gap-6">
              <button className="lg:hidden p-2 hover:bg-white/10 rounded-full transition-colors"><IconMenu /></button>
              <div className="cursor-pointer select-none" onClick={() => {setView('home'); setActiveCategory('Todas');}}>
                <h1 className="text-3xl font-black tracking-tighter uppercase flex items-center gap-1">
                  <span onDoubleClick={handleSecretAccess} className="animate-spin-logo bg-[#EF4444] text-white px-2 py-0.5 rounded shadow-[0_0_15px_rgba(239,68,68,0.5)] text-2xl cursor-pointer">A</span>
                  RENA<span className="font-light text-gray-300">NEWS</span>
                </h1>
              </div>
            </div>
            <nav className="hidden lg:flex items-center gap-1 overflow-x-auto no-scrollbar">
              {categorias.map(cat => (
                <button key={cat} onClick={() => {setActiveCategory(cat); setView('home');}} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all duration-300 ${activeCategory === cat ? 'bg-[#10B981] text-[#0B172A]' : 'text-gray-300 hover:text-white'}`}>{cat}</button>
              ))}
            </nav>
            {isAdmin && (
              <button onClick={() => {setView(view === 'admin' ? 'home' : 'admin'); setAdminTab('noticias');}} className="bg-[#10B981] text-[#0B172A] px-5 py-2.5 rounded-full text-xs font-black uppercase flex items-center gap-2 transition-all transform hover:scale-105"><IconSettings /> PAINEL GERAL</button>
            )}
          </div>
        </header>
      );

      const renderTicker = () => (
        <div className="bg-[#EF4444] text-white overflow-hidden py-2 shadow-md relative z-40 border-b border-red-800">
          <div className="max-w-[1400px] mx-auto flex items-center">
            <div className="bg-[#0B172A] text-white px-4 py-1.5 rounded-r-full text-[11px] font-black uppercase tracking-widest absolute flex items-center gap-2 border-r-2 border-[#10B981]">
              <span className="w-2 h-2 rounded-full bg-[#EF4444] animate-pulse"></span> RADAR AO VIVO
            </div>
            <div className="w-full overflow-hidden ml-36">
              <div className="animate-marquee-custom font-bold text-sm">
                {tickerItems.map((item, i) => <span key={i} className="mx-8">{item}</span>)}
              </div>
            </div>
          </div>
        </div>
      );

      const renderHomeView = () => {
        const filtered = activeCategory === 'Todas' ? articles : articles.filter(a => a.category === activeCategory);
        const featured = filtered[0];
        const rest = filtered.slice(1);
        const tables = dashboardTables[activeCategory] || dashboardTables['Todas'] || [];
        const matches = upcomingMatches[activeCategory] || upcomingMatches['Todas'] || [];

        if (loading) return <div className="text-center p-20 text-gray-400 font-black animate-pulse">SINCRONIZANDO COM A REDAÇÃO...</div>;

        return (
          <main className="max-w-[1400px] mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div className="lg:col-span-8">
              {featured ? (
                <div onClick={() => openArticle(featured)} className="group cursor-pointer relative overflow-hidden rounded-3xl shadow-2xl aspect-[16/10] md:aspect-[21/9] bg-[#0B172A] mb-10 border border-gray-200/20">
                  <img src={featured.image} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 group-hover:scale-[1.03] transition-all duration-700" />
                  <div className="absolute inset-0 bg-gradient-to-t from-[#0B172A] via-[#0B172A]/70 to-transparent"></div>
                  <div className="absolute bottom-0 left-0 w-full p-8 md:p-10">
                    <span className="bg-[#10B981] text-[#0B172A] text-xs font-black uppercase px-3 py-1 rounded-md mb-4 inline-block shadow-lg">{featured.category}</span>
                    <h2 className="text-3xl md:text-5xl font-black text-white leading-tight mb-4 group-hover:text-[#10B981] transition-colors drop-shadow-lg">{featured.title}</h2>
                    <p className="text-gray-300 text-lg line-clamp-2 max-w-2xl">{featured.excerpt}</p>
                  </div>
                </div>
              ) : <div className="text-center py-20 text-gray-300 font-bold border-2 border-dashed rounded-3xl">Portal vazio. Acesse o painel e crie a primeira notícia.</div>}
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                {rest.map(a => (
                  <div key={a.id} onClick={() => openArticle(a)} className="bg-white rounded-2xl shadow-sm hover:shadow-xl border border-gray-100 flex flex-col overflow-hidden transition-all transform hover:-translate-y-1 cursor-pointer">
                    <img src={a.image} className="aspect-video object-cover" />
                    <div className="p-5 flex flex-col flex-1">
                      <span className="text-[10px] font-black uppercase text-[#10B981] mb-2">{a.category}</span>
                      <h3 className="text-xl font-bold text-[#0B172A] line-clamp-2 mb-2 group-hover:text-[#10B981] transition-colors">{a.title}</h3>
                      <div className="mt-auto pt-4 border-t border-gray-50 text-[10px] text-gray-400 font-bold flex justify-between">
                         <span><IconClock /> {formatDateTime(a.date)}</span>
                         <span className="flex items-center gap-1"><IconEye /> {a.views}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <aside className="lg:col-span-4 flex flex-col gap-6">
              {matches.length > 0 && (
                <div className="bg-[#0B172A] rounded-3xl overflow-hidden shadow-lg border-t-[3px] border-[#EF4444]">
                  <div className="bg-[#EF4444] p-4 text-white font-black text-xs uppercase flex items-center gap-2"><IconCalendar /> Próximas Transmissões</div>
                  <div className="p-4 flex flex-col gap-3">
                    {matches.map((m, i) => (
                      <div key={i} className="bg-white/10 p-3 rounded-xl border border-white/5 hover:bg-white/20 transition-colors">
                        <span className="text-[#10B981] text-[10px] font-black block uppercase tracking-widest">{m.cup}</span>
                        <p className="font-bold text-white text-sm">{m.match}</p>
                        <p className="text-gray-400 text-[10px] mt-1 flex items-center gap-1"><IconClock /> {m.date}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {tables.map((t) => (
                <div key={t.id} className="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-lg animate-fade-slide">
                  <div className="bg-[#0B172A] p-4 text-white font-black text-xs uppercase flex items-center gap-2 border-b-[3px] border-[#10B981]">
                    {t.type === 'trends' ? <IconTrending /> : <IconTrophy />} {t.title}
                  </div>
                  <table className="w-full text-sm text-left">
                    <thead className="bg-gray-50 text-[10px] uppercase text-gray-400 font-bold">
                      <tr><th className="px-4 py-2">Competidor</th><th className="px-4 py-2 text-right">Status</th></tr>
                    </thead>
                    <tbody>
                      {t.data.map((row, i) => (
                        <tr key={i} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                          <td className="px-4 py-3 font-bold text-[#0B172A] flex items-center gap-2">
                            {t.type !== 'trends' && <span className={`w-5 h-5 flex items-center justify-center rounded text-[10px] ${i===0 ? 'bg-[#10B981] text-[#0B172A]' : 'bg-gray-100 text-gray-400'}`}>{i+1}</span>}
                            {row.team}
                          </td>
                          <td className={`px-4 py-3 text-right font-black ${i===0 ? 'text-[#10B981]' : 'text-[#0B172A]'}`}>{row.stat}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ))}
            </aside>
          </main>
        );
      };

      const renderAdminPanel = () => {
        const [catFilter, setCatFilter] = useState('Futebol');
        const [post, setPost] = useState({ title: '', category: 'Futebol', excerpt: '', image: '', content: '', date: new Date().toISOString().slice(0, 16) });
        const [editId, setEditId] = useState(null);
        const [newCatName, setNewCatName] = useState('');

        const saveArticle = async () => {
          if(!post.title || !post.image) return alert("Título e Imagem são obrigatórios.");
          try {
            if(editId) {
              await supabase.from('noticias').update(post).eq('id', editId);
              setArticles(articles.map(a => a.id === editId ? { ...post, id: editId } : a));
            } else {
              const id = Date.now().toString();
              await supabase.from('noticias').insert([{ ...post, id, views: '0' }]);
              setArticles([{ ...post, id, views: '0' }, ...articles]);
            }
            alert("Salvo com sucesso!"); setEditId(null); setPost({ title: '', category: 'Futebol', excerpt: '', image: '', content: '', date: new Date().toISOString().slice(0, 16) });
          } catch(e) { alert("Erro ao salvar."); }
        };

        return (
          <div className="max-w-[1400px] mx-auto p-6 animate-fade-slide">
            <div className="flex flex-wrap gap-2 mb-8 bg-white p-3 rounded-2xl shadow-sm border overflow-x-auto">
              {['noticias', 'tabelas', 'transmissoes', 'ticker'].map(t => (
                <button key={t} onClick={() => setAdminTab(t)} className={`px-6 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest transition-all ${adminTab === t ? 'bg-[#0B172A] text-[#10B981] shadow-lg' : 'text-gray-400 hover:bg-gray-50'}`}>{t}</button>
              ))}
            </div>

            {adminTab === 'noticias' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-8 bg-white p-8 rounded-3xl border shadow-xl">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input className="md:col-span-2 p-4 bg-gray-50 border rounded-xl font-bold outline-none focus:border-[#10B981]" placeholder="Título da Notícia" value={post.title} onChange={e => setPost({...post, title: e.target.value})} />
                    <select className="p-4 bg-gray-50 border rounded-xl font-bold outline-none" value={post.category} onChange={e => setPost({...post, category: e.target.value})}>
                      {categorias.filter(c => c !== 'Todas').map(c => <option key={c}>{c}</option>)}
                    </select>
                    <input type="datetime-local" className="p-4 bg-gray-50 border rounded-xl outline-none" value={post.date} onChange={e => setPost({...post, date: e.target.value})} />
                  </div>
                  <input className="w-full p-4 bg-gray-50 border rounded-xl mb-4 outline-none" placeholder="Resumo (Lide)" value={post.excerpt} onChange={e => setPost({...post, excerpt: e.target.value})} />
                  <textarea rows="8" className="w-full p-4 bg-gray-50 border rounded-xl mb-4 outline-none resize-none font-serif text-lg" placeholder="Texto completo da matéria..." value={post.content} onChange={e => setPost({...post, content: e.target.value})} />
                  <div className="border-2 border-dashed p-6 rounded-xl mb-6 bg-gray-50 hover:border-[#10B981] transition-colors">
                    <input type="file" accept="image/*" onChange={e => {
                      const reader = new FileReader(); reader.onload = () => setPost({...post, image: reader.result}); reader.readAsDataURL(e.target.files[0]);
                    }} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-[#10B981] file:text-[#0B172A] cursor-pointer" />
                    {post.image && <img src={post.image} className="mt-4 h-40 object-cover rounded-lg shadow-md" />}
                  </div>
                  <button onClick={saveArticle} className="w-full bg-[#10B981] text-[#0B172A] p-4 rounded-xl font-black uppercase tracking-widest shadow-lg hover:bg-emerald-400 transition-all transform hover:-translate-y-1">SALVAR NO BANCO DE DADOS</button>
                </div>
                <div className="lg:col-span-4 bg-white p-6 rounded-3xl border shadow-sm h-fit">
                  <h3 className="font-black text-xs uppercase mb-4 text-gray-400 tracking-widest border-b pb-2">HISTÓRICO DE PUBLICAÇÕES</h3>
                  <div className="flex flex-col gap-3 max-h-[600px] overflow-y-auto custom-scrollbar pr-2">
                    {articles.map(a => (
                      <div key={a.id} className="p-4 bg-gray-50 border rounded-xl flex flex-col gap-2 hover:border-[#10B981] transition-colors">
                        <p className="font-bold text-sm truncate text-[#0B172A]">{a.title}</p>
                        <div className="flex gap-2">
                          <button onClick={() => {setPost(a); setEditId(a.id); window.scrollTo(0,0);}} className="text-blue-500 font-black text-[10px] uppercase">EDITAR</button>
                          <button onClick={async () => {if(confirm('Apagar da nuvem permanentemente?')){ await supabase.from('noticias').delete().eq('id', a.id); setArticles(articles.filter(x => x.id !== a.id)); }}} className="text-red-500 font-black text-[10px] uppercase">APAGAR</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {adminTab === 'tabelas' && (
              <div className="bg-white p-8 rounded-3xl border shadow-xl max-w-4xl mx-auto">
                <div className="flex flex-col md:flex-row gap-4 mb-8 p-4 bg-gray-50 rounded-xl border">
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase text-gray-400 block mb-1">Filtrar por Esporte</label>
                    <select className="w-full p-3 rounded-lg font-bold outline-none border" value={catFilter} onChange={e => setCatFilter(e.target.value)}>
                      {categorias.map(c => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] font-black uppercase text-gray-400 block mb-1">Criar Novo Esporte</label>
                    <div className="flex gap-2">
                      <input className="flex-1 p-3 border rounded-lg outline-none focus:border-[#10B981]" placeholder="Ex: Fórmula 1" value={newCatName} onChange={e => setNewCatName(e.target.value)} />
                      <button onClick={async () => { if(!newCatName) return; await supabase.from('categorias').insert([{nome: newCatName}]); setCategorias([...categorias, newCatName]); setNewCatName(''); }} className="bg-[#10B981] px-4 rounded-lg text-[#0B172A]"><IconPlus /></button>
                    </div>
                  </div>
                </div>
                <div className="flex flex-col gap-8">
                  {(dashboardTables[catFilter] || []).map((t) => (
                    <div key={t.id} className="p-6 bg-gray-50 rounded-2xl border shadow-inner">
                      <div className="flex justify-between mb-6 border-b pb-2">
                        <input className="font-black text-lg bg-transparent outline-none focus:border-[#10B981] text-[#0B172A]" value={t.title} onChange={async e => {
                          const updated = {...t, title: e.target.value};
                          await supabase.from('tabelas_dashboard').update({title: e.target.value}).eq('id', t.id);
                          setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].map(x => x.id === t.id ? updated : x) }));
                        }} />
                        <button className="text-red-500" onClick={async () => {if(confirm('Excluir campeonato?')){ await supabase.from('tabelas_dashboard').delete().eq('id', t.id); setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].filter(x => x.id !== t.id) })); }}}><IconTrash /></button>
                      </div>
                      {t.data.map((row, ri) => (
                        <div key={ri} className="flex gap-2 mb-2">
                          <input className="flex-1 p-3 border rounded-lg font-bold" value={row.team} onChange={async e => {
                            const newData = [...t.data]; newData[ri].team = e.target.value;
                            await supabase.from('tabelas_dashboard').update({data: newData}).eq('id', t.id);
                            setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].map(x => x.id === t.id ? {...x, data: newData} : x) }));
                          }} />
                          <input className="w-24 p-3 border rounded-lg text-center font-bold text-[#10B981]" value={row.stat} onChange={async e => {
                            const newData = [...t.data]; newData[ri].stat = e.target.value;
                            await supabase.from('tabelas_dashboard').update({data: newData}).eq('id', t.id);
                            setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].map(x => x.id === t.id ? {...x, data: newData} : x) }));
                          }} />
                          <button className="text-gray-300 hover:text-red-500" onClick={async () => {
                            const newData = t.data.filter((_, i) => i !== ri);
                            await supabase.from('tabelas_dashboard').update({data: newData}).eq('id', t.id);
                            setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].map(x => x.id === t.id ? {...x, data: newData} : x) }));
                          }}><IconTrash /></button>
                        </div>
                      ))}
                      <button onClick={async () => {
                        const newData = [...t.data, {team: 'Novo', stat: '0'}];
                        await supabase.from('tabelas_dashboard').update({data: newData}).eq('id', t.id);
                        setDashboardTables(prev => ({ ...prev, [catFilter]: prev[catFilter].map(x => x.id === t.id ? {...x, data: newData} : x) }));
                      }} className="w-full p-3 bg-white border border-dashed rounded-lg mt-3 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:border-[#10B981] hover:text-[#10B981] transition-all">+ Adicionar Competidor</button>
                    </div>
                  ))}
                  <button onClick={async () => {
                    const nova = { category: catFilter, title: 'Novo Campeonato', type: 'points', data: [{ team: 'Equipe', stat: '0' }] };
                    const { data } = await supabase.from('tabelas_dashboard').insert([nova]).select();
                    if(data) setDashboardTables(prev => ({ ...prev, [catFilter]: [...(prev[catFilter] || []), data[0]] }));
                  }} className="bg-[#0B172A] text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl transform transition-all hover:scale-105">+ CRIAR NOVA TABELA NESTA CATEGORIA</button>
                </div>
              </div>
            )}

            {adminTab === 'transmissoes' && (
              <div className="bg-white p-8 rounded-3xl border shadow-xl max-w-4xl mx-auto">
                 <select className="w-full p-4 mb-6 bg-gray-50 border rounded-xl font-bold outline-none" value={catFilter} onChange={e => setCatFilter(e.target.value)}>
                  {categorias.map(c => <option key={c}>{c}</option>)}
                </select>
                <div className="bg-gray-50 p-6 rounded-2xl border shadow-inner">
                  {(upcomingMatches[catFilter] || []).map((m, i) => (
                    <div key={i} className="grid grid-cols-12 gap-3 mb-3 bg-white p-3 border rounded-xl shadow-sm items-center">
                      <input className="col-span-4 p-2 border rounded-lg text-sm font-bold" value={m.match} onChange={async e => {
                        const newList = [...upcomingMatches[catFilter]]; newList[i].match = e.target.value;
                        await supabase.from('transmissoes').delete().eq('category', catFilter);
                        await supabase.from('transmissoes').insert(newList.map(x => ({...x, category: catFilter})));
                        setUpcomingMatches({...upcomingMatches, [catFilter]: newList});
                      }} />
                      <input className="col-span-4 p-2 border rounded-lg text-sm" value={m.cup} onChange={async e => {
                        const newList = [...upcomingMatches[catFilter]]; newList[i].cup = e.target.value;
                        await supabase.from('transmissoes').delete().eq('category', catFilter);
                        await supabase.from('transmissoes').insert(newList.map(x => ({...x, category: catFilter})));
                        setUpcomingMatches({...upcomingMatches, [catFilter]: newList});
                      }} />
                      <input className="col-span-3 p-2 border rounded-lg text-xs" value={m.date} onChange={async e => {
                        const newList = [...upcomingMatches[catFilter]]; newList[i].date = e.target.value;
                        await supabase.from('transmissoes').delete().eq('category', catFilter);
                        await supabase.from('transmissoes').insert(newList.map(x => ({...x, category: catFilter})));
                        setUpcomingMatches({...upcomingMatches, [catFilter]: newList});
                      }} />
                      <button className="col-span-1 text-red-400 hover:text-red-600" onClick={async () => {
                        const newList = upcomingMatches[catFilter].filter((_, idx) => idx !== i);
                        await supabase.from('transmissoes').delete().eq('category', catFilter);
                        if(newList.length > 0) await supabase.from('transmissoes').insert(newList.map(x => ({...x, category: catFilter})));
                        setUpcomingMatches({...upcomingMatches, [catFilter]: newList});
                      }}><IconTrash /></button>
                    </div>
                  ))}
                  <button onClick={async () => {
                    const newItem = { match: 'Time A x Time B', cup: 'Campeonato', date: 'Hoje, 20:00' };
                    const newList = [...(upcomingMatches[catFilter] || []), newItem];
                    await supabase.from('transmissoes').delete().eq('category', catFilter);
                    await supabase.from('transmissoes').insert(newList.map(x => ({...x, category: catFilter})));
                    setUpcomingMatches({...upcomingMatches, [catFilter]: newList});
                  }} className="w-full bg-[#10B981] p-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-md hover:bg-emerald-400 mt-4">+ ADICIONAR NOVA TRANSMISSÃO</button>
                </div>
              </div>
            )}

            {adminTab === 'ticker' && (
              <div className="bg-white p-8 rounded-3xl border shadow-xl max-w-3xl mx-auto">
                 <div className="flex flex-col gap-4">
                   {tickerItems.map((item, i) => (
                     <div key={i} className="flex gap-2">
                       <input className="flex-1 p-4 border rounded-xl font-bold bg-gray-50 focus:border-[#EF4444] outline-none" value={item} onChange={e => {
                         const copy = [...tickerItems]; copy[i] = e.target.value; setTickerItems(copy);
                       }} />
                       <button className="bg-red-50 text-red-500 px-4 rounded-xl" onClick={() => setTickerItems(tickerItems.filter((_, idx) => idx !== i))}><IconTrash /></button>
                     </div>
                   ))}
                   <button onClick={() => setTickerItems([...tickerItems, "Nova notícia urgente..."])} className="p-4 bg-gray-100 rounded-xl font-black text-[10px] uppercase tracking-widest text-gray-500">+ ADICIONAR FRASE AO GIRO</button>
                   <button onClick={async () => {
                     await supabase.from('tickers').delete().neq('message', '!!!');
                     await supabase.from('tickers').insert(tickerItems.map(m => ({ message: m })));
                     alert("Radar Ao Vivo Atualizado!");
                   }} className="bg-[#EF4444] text-white p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transform transition-all hover:scale-105">SALVAR E COLOCAR NO AR</button>
                 </div>
              </div>
            )}
          </div>
        );
      };

      const renderArticleView = () => {
        if (!selectedArticle) return null;
        return (
          <article className="max-w-[850px] mx-auto px-4 py-12 animate-fade-slide">
            <button onClick={() => setView('home')} className="flex items-center gap-2 text-gray-400 font-bold text-xs uppercase mb-8 hover:text-[#0B172A] transition-colors bg-white px-4 py-2 rounded-full border shadow-sm"><IconChevronLeft /> Voltar ao Portal</button>
            <div className="flex items-center gap-3 mb-6">
              <span className="bg-[#10B981] text-[#0B172A] font-black uppercase text-[10px] px-3 py-1 rounded shadow-sm">{selectedArticle.category}</span>
              <span className="text-gray-400 text-xs font-bold border-l pl-3"><IconClock /> {formatDateTime(selectedArticle.date)}</span>
            </div>
            <h1 className="text-4xl md:text-6xl font-black text-[#0B172A] mb-8 leading-tight tracking-tight">{selectedArticle.title}</h1>
            <p className="text-2xl text-gray-500 font-medium mb-12 border-l-4 border-[#10B981] pl-8 leading-relaxed italic">{selectedArticle.excerpt}</p>
            <img src={selectedArticle.image} className="w-full rounded-[40px] shadow-2xl mb-12 aspect-[21/9] object-cover border-4 border-white" />
            <div className="text-xl text-gray-800 leading-relaxed font-serif whitespace-pre-wrap space-y-6">{selectedArticle.content}</div>
          </article>
        );
      };

      return (
        <div className="min-h-screen pb-20">
          {renderHeader()}
          {renderTicker()}
          {view === 'home' && renderHomeView()}
          {view === 'article' && renderArticleView()}
          {view === 'admin' && renderAdminPanel()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ArenaNews />);
  </script>
</body>
</html>
